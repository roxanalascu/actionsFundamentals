name: Reusable workflow
on:
  workflow_call:
    inputs:
      who-to-greet:
        description: 'Who to greet'
        type: string
        required: true
        default: World
    outputs:
      current-time:
        description: 'The time of greeting'
        value: ${{ jobs.reusable-job.outputs.current-time }}
jobs:
  reusable-job:
    runs-on: ubuntu-latest
    steps:
      - name: Greet
        run: echo "Hello ${{ inputs.who-to-greet }}"
      - name: Set currentTime
        id: time
        run: echo "currentTime=$(date)" >> $GITHUB_OUTPUT
    outputs:
      current-time: ${{ steps.time.outputs.currentTime }}
